front:
  text: 唐玄宗御製道德眞經䟽卷之二才二
  hash: sha256:49f991173b23759697c9e38937754b41d5fb7fff4a08d3692c970afb2642217f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0062_HFL_002-001a, image: hfl/0358/0358-078.png}
body:
  text: 致虛極章第十六致虚極守靜篤䟽曰水流濕火就燥者易乾卦九五爻辭也春秋致師之義也義曰春秋宣公十二年楚莊王圍鄭旬有七日鄭人卜行成不吉國人大臨楚莊王退師鄭人修城復圍之三月克之鄭伯肉袒牽羊以逆楚王既而許之平潘尪又盟子良出質夏六月晋師救鄭及敖鄗之間楚莊乃求成於晋盟有日矣楚許伯御樂伯攝叔爲右欲單伹挑戰示不欲和以致晋師許伯曰吾聞致師者御靡旌麾壘而還樂伯曰致師者左射之菆代御執轡御下兩馬掉鞅而還攝叔曰致師者右入壘折馘斬俘而還皆行其所聞而復晋人逐之樂伯左射馬右射人逐不能進時魏錡趙旃有憾於晋請使於楚皆欲晋敗彘子又不設備戰于邲晋師敗績焉以此致師師必致敵吾以觀其復䟽易曰雷在地中復義曰易復卦象曰雷在地中復者雷是動物復卦以動息爲主故曰雷在地中先王以至日閉關商旅不行后不省方皆取動息之義以復其本也不知常注不恒其德者易恒卦九三辭也大上章第十七其畏之侮之䟽三王五霸義曰三王者夏殷周也五霸者夏有昆吾黄帝之後也殷之霸者有大彭豕韋堯之後也周之霸者齊桓公僖公之庶子名小白周惠王襄王之時也晋文公者獻公之子名重耳以僖公二十二年立文公以僖四年避驪姬之禍信不足有不信義曰春秋宣十一年楚子伐鄭及櫟鄭大夫子良曰楚晋不務德與其來者可也晋楚無信我焉得有信乃從楚夏及楚子盟于辰陵陳鄭服也此乃信不足有不信焉大道廢章第十八䟽數米炊簡髮櫛義曰淮南子曰數米簡髮煩而不察有爲之甚也何異乎以膝搔背以踵解結矣六親不和有孝慈䟽扇枕温席者義曰宋有郅苞字孝嘗三歲而孤其伯父悛等皆顯貴苞見之常泣母陳氏疑其畏憚而怒之苞曰自悲早不識父今見諸父相似心中悲耳因歔欷母亦悲慟苞奉其母夏則扇枕冬則温席焉國家昏亂有忠臣義曰讜正曰忠阿諂曰佞不明于理曰昏上下不理曰亂䟽斯皇多士盡是夔龍彝倫所叙無非作乂理也義曰詩云濟濟多士文王以寧多士衆臣夔龍舜佐臣也書云夔作典樂八音克諧擊石拊石百獸率舞簫韶九成鳳凰來儀龍爲納言出納王命彝倫攸叙言舜得良臣典法不失其政也絕聖棄智章第十九絶巧棄利䟽列子説第八篇義曰衛人之刻棗猴宋人之琢楮葉也可絶之絕學無憂章第二十荒兮其未央哉䟽詩曰夜未央義曰詩小雅庭燎篇文也衆人熙熙如享太牢如春登臺義曰六印垂腰五府交辟一怒而諸侯懼安居而天下息繁華忽其滿志富貴樂其當年五鼎列食厭太牢之盈味衆芳悦性喜春臺之縱目至有燕姝洛艷楚舞吴歌八音聵其聰五色熏其鑿樂則樂矣終復如何禮器云太牢而祭不必有餘言稱性之大小也又云諸侯七牢大夫五牢故春秋吴徵魯之百牢是矣夫牛羊豕三牲通謂之牢牛者祭之牢也天子以犧牛謂全色也諸侯以肥羊大夫以牽牛求得即用無所擇也牛謂一元大武將祭必繫於牢芻之三月所養必有其式以備不常如左傳鼷鼠食郊牛角乃改卜牲也羊者天子舋廟開冰告朔皆用之謂之柔毛孟春食麥與羊是也豕者天子之祭皆用之以備三牲則牛曰大牢羊曰中牢豕曰少牢曰剛鬛是也禮天子無故不殺牛大夫無故不殺犬彘謂其皆祭禮所用非祭而殺是謂無故也牢者取其四固以養犧牲通謂之牢矣䟽春日遲遲采繁祁祁義云采繁生蠶之時繁皤蒿也祁祁衆多也如嬰兒之未孩䟽不至于孩而始誰義云莊子天運十四篇文也家語本命篇云人生三月而微眴然後目能見八月生齒然後能食期而生臏然後能行三年間合然後能言也曲則全章第二十二枉則直䟽春秋曰正曲曰直義云廉頗相如是也義曰春秋襄七年冬十月晋卿韓獻子厥告老其子穆子無忌有廢疾將立之辭曰詩云豈不夙夜謂行多露又曰弗躬弗親庶人弗信無忌不才讓其可乎請立起也與田蘇游而曰好仁詩曰靖恭爾位好是正直神之聽之介爾景福恤民爲德正直爲正正己心也正曲爲直正人曲也三和爲仁德正直三者備爲人也如是則明神聽之介福降之立之不亦可乎庚戌使韓起朝獻子遂請老晋侯謂韓無忌仁使爲公族大夫焉抱一爲天下式義曰一國三公自然難理十羊九牧詎可化一亡羊者難乎多岐喪生者由其多事希言自然章第二十三同於道者至失亦得之義曰故彈宫則宫應彈角則角應者聲相感也枯桑動而天風暑雨降而礎潤氣相感也龍吟雲起虎嘯風生有情感無情也銅山崩而鐘應類相感也葭灰缺而暈虧事相感也鶴鳴子和性相感也積善餘慶積惡餘殃行相感也同舟共濟胡越不患於異心勢相感也流濕就燥無情感於無情也君子千里同風小人隔陌異俗䟽曰方諸陽燧者義云東海方諸之間有巨蚌焉長尺有二寸者因名方諸取其殻以柔帛拭之良久以月照之以器承之則得水焉陽燧火鏡也以取火也古之祭法尚潔以方諸引水陽燧火用也跂者不立章第二十四自伐者無功義曰春秋襄二十九年齊放其大夫高止于北燕傳曰高止好以事自爲功且專故及於難也春秋哀二年趙簡子與鄭戰爲鄭人所擊掊於車中失其蜂旗公孫龍率徒五百人助之宵攻鄭師取蜂旗鄭師大敗既戰簡子曰吾伏㢰位區切血鼓音不衰今日我上也衛太子蒯聵爲右曰吾救主於車退敵於下我右之上也御者卸良曰我兩鞃胡薨切軾中範也陣將絶吾能止之我御之上也此言簡子不讓故其下皆自伐其功故不克和矣餘食贅行䟽春秋曰人將不食吾餘者義曰春秋莊六年楚文王伐申過鄧鄧祁侯曰吾甥也止而饗之祁侯之三甥騅甥聃甥養甥請殺楚子祁侯不許三甥曰亡鄧國者必此人也若不早圖後若噬臍其及圖之乎圖之此爲時矣祁侯曰人將不食吾餘言自害其甥必爲人所賤也對曰不從三臣之言抑社稷實不血食而君焉取餘弗從伐申還遂伐鄧十六年復伐鄧滅之即莊公十六年也有物混成章第二十五吾不知其名義云凡物先名而後字者禮男子生三日以桑弧一蓬矢六以射天地四方以示男子有事於四方也既三月妻以子見其夫入門升自阼階妻抱子出自升階父執之右手孩而名之撫其首焉二十而冠謂之成人冠適音的子於阼階以著代也著音注也醮於客位有成人之道也三加其冠始以緇布次以皮弁次以爵弁言益尊之冠而字之敬其名也女子十五而笄笄而字之故冠禮者禮之始也嘉事之重也此則先名而後字取自小而成大也人倫之道始則有終故自小而成大自大而復終也春秋桓六年九月丁卯子同生公問名於申繻對曰名有五有信有義有象有假有類以名生爲信唐叔虞魯公子友是也以德命爲義文王昌武王發是也以類命爲象若孔子像尼丘山是也取於物爲假如伯魚生有人饋魚因名曰鯉是也取於父爲類若子同生與父同日生是也不以國以國則廢名不以官以官則廢職不以山川以山川則廢主不以畜牲以畜牲則廢社不以器幣以器幣則廢禮不以隱故名終將諱之故晋以僖侯廢司徒宋以武功廢司空先君獻武廢二山具山敖山是以大物不可以命公曰是其生也與吾同物命之曰同氏族者春秋隱八年冬公子無駭卒公子羽父請謚與族公問族於衆仲對曰天子建德因生以賜姓胙之以土而命之氏諸侯以其王父字或以謚因以爲族官有世功則有官族謂取舊官舊邑爲族也邑亦如之公命自字爲展氏無駭即公子展之孫也天道也先字而後名言道無所始亦無所終也大曰逝䟽莊子曰夫道於大不終天運十四而王居其焉義曰王若有道則日月如合璧五星如連珠甘露降醴泉出河不滿溢海不揚波景星見卿雲生神龍遊其沼麟鳳來其庭四氣調和而爲玉燭萬物遂性而洽太平也人君若無道則天反時爲灾地反物爲妖人反德爲亂沴氣咎徴時見於上物妖形怪忽見於下星亡日鬭冬雷夏霜天裂石霣川竭山崩事興於人而氣感於天是天地蒙其害也人法地至自然䟽塞源拔本者義曰春秋昭九年晋梁丙張趯率陰戎伐潁以周甘人與晋閏嘉爭閏田故也周景王使大夫詹桓伯辭於晋曰我自夏以后稷魏駘芮歧畢吾西土也巴濮楚鄧吾南土也及武王克商蒲姑商奄吾東土也肅愼燕亳吾北土也吾何邇封之有文武成康之建母弟以藩屏周亦其廢墜是爲豈如弁旄因而以蔽之先王居檮杌于四裔以禦魑魅故允姓之奸居于瓜州伯父惠公歸自秦而誘之以來使偪我諸姬入我郊甸則戎焉取之戎有中國誰之咎也后稷封殖天下今戎制之不亦難乎伯父圍之我在伯父猶衣服之有冠冕水木之有本原民人之有謀主也伯父若裂冠毁冕拔本塞源專棄謀主雖戎狄其何有余一人叔向謂宣子曰文之霸也豈能改物翼戴天子而加之以恭自文以來世有衰德而暴蔑宗周以宣示其侈諸侯之貳不亦宜乎且王辭直子其圖之宣子説王有姻喪使趙成如周弔且致閆田與襚反潁俘王亦使賔滑執甘大夫襄以説於晋晋人禮而歸之重爲輕根章第二十六重爲輕根䟽朵頤之求者義曰易頤卦初九之辭也言人之開發言語咀嚼飲食皆當動頤君子觀此頤象故謹愼言語裁節飲食也雖有榮觀䟽高臺深池者義曰春秋昭二十年冬十月齊景公癠遂痁式占切疾也期而不瘳諸侯之賔問疾者多在梁丘據與裔款二大夫言於公曰吾事鬼神豐於先君有駕矣今君疾病爲諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史器以辭賔公悦告晏子晏子曰昔宋之盟屈建問范會之德於趙武趙武曰夫子之家事治言於晋國竭情無私其祝史祭祝陳信不愧其家事無猜其祝史不祈建以語康王康王曰神人無怨宜夫子之光輔五君以爲諸侯主也五君文襄虛武景也公曰據與款謂寡人能事鬼神故欲誅於祝史子稱是語何故對曰若有德之君外内不廢上下無怨動無違事其祝史薦信無愧心矣是以鬼神用饗國受其福祝史與焉其所以蕃祉老壽者爲信君使也其言忠信於鬼神其適遇淫君外内頗邪上下怨疾動作僻違縱欲厭私高臺深池撞鍾舞女斬艾民力輸掠其聚以成其違不恤後人暴虐淫縱肆行非度無所還忌不思謗讟不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也其蓋失數美是矯誣也進退無辭則虚以求媚是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者爲暴君使也其言僭嫚於鬼神公曰然則若之何對曰不可爲山林之木衛鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政偪介之關暴征其私承嗣大夫强易其賄市常無藝徵斂無度宫室日更淫樂弗違内寵之妾肆奪于市外寵之臣僭令於鄙私欲養求不給則應民人苦病夫婦皆詛呪若有益詛亦有損聊攝以東姑尤以西其爲人也多矣雖其善祝豈能違億兆人之詛君若欲誅于祝史修德而後可公悦使有司寬政毁關去禁薄斂已責十二月景公畋于沛此言晏子言之所利而景公從諫修德而疾速愈遽能畋獵也善行章第二十七善人不善人之師義云大學之禮雖詔於天子無北面所以尊師也善學者師逸而功倍不善學者師勤而功半又從而怨之言先王事師之道無北面王行而西折而南面東而立師尚父面西以道書之㫖以教於王故王之義君父師也師無當於五服五服不得不親是則爲師之道也雖知大迷義云夫初修者有十事不可不知也一者初地之人先因善欲有欲樂心乃能進趣二者親近善友導引其心深信正道三者簉詣明師師有妙法廣能宣告示以要術四者既聞正教能受讀誦五者能出家專行柔弱永斷有爲離諸桎梏六者參受正戒防身口心七者幽隱山林栖遁獨處永離囂塵修寂靜志八者當念大道是眞法王能度衆生越生死海猶如船師拯濟沉溺九者當念經教是妙醫方能示衆生理煩惱藥十者當念正法是眞父母善能生我法身慧命以是十法爲地初地因次以小乗柔伏之法又進中乗兼修之法後入大乗觀行之法將欲章第二十九將欲取天下而爲之義曰天下之主身有殊祥履巨迹而誕伏義感神龍而孕炎帝軒轅乃電光繞斗少昊乃星彩流虹顓頊高辛生資睿聖唐堯虞舜天表神奇堯火運於赤龍舜土德於虹瑞月精命禹燕卵降湯紫氣靄於碭山赤光照于漢室皆并身有殊祥也積玄勳而黃軒受命禀前功而顓頊叶符黃帝十七世而祚有殷后稷十三世而興西伯此皆積世累功也執者失之義曰人君繼體承乾不以其德毒流海内禍起寰中號令不行戈鋋内向天下既亂海内沸騰眞主應運救人撥亂反正如夏禹殷湯周武漢祖創業之君也天下既定授于子孫故嗣主繼明守文承統如夏桀殷紂周赧漢獻爲繼體之君也但創業之君必資聖德塞違輔過明德顯仁招懷隱淪求採瘼病初有大寳罕及敗亡蓋其勵精求理故也而繼體之君不知稼穡長於婦人之手生於深宫之中八音五色亂其心麗服淫聲溺其性或窮兵四境流毒九州視赤子若仇讎顧生人如草芥動致芟刈不循憲章反道違天凌虐神主民人也於是戈鋋四起水旱不時神怒衆離鬼哭人怨遂有南巢放逐牧野梟夷殞身黔庶之中失政奸雄之手洪圖一失大業不歸此明執者失之爲後王之戒昭德塞違者春秋桓二年宋華督殺孔嘉父而弑殤公立公子憑是爲莊公以郜鼎賂於魯桓公公納之於廟大夫臧哀伯諫曰君人者將昭德塞違以臨百官猶懼失之今眞其賂器於太廟明示百官百官象之又何誅焉昔武王克商遷九鼎於洛邑義士猶或非之而况昭違禮之賂器於太廟其若之何瘼病沴妖氣也内起曰眚外起曰灾亦天火曰灾也以道佐人主章第三十以道佐人主者義曰舞干戚者禹欲伐有苗氏既伐三旬弗及苗民逆命益謂禹曰惟德動天無遠弗届至誠感神况於有苗乎禹班師振旅誕敷文德舞干羽于兩階七旬而有苗格其國在荒服之例禮曰舞者所以飾喜也執其干戚習其俯仰屈伸容貌得莊焉行其綴兆要其節奏行列得正焉羽籥干戚舞之器也屈伸俯仰舞之容也綴兆舒疾舞之列也或天子八佾諸侯六大夫四士二也故善者果而已䟽殺敵爲果義云春秋宣二年春鄭公子歸生受楚子之命伐宋宋華元禦之戰于大棘宋師敗績囚華元獲司空樂莒甲車四百六十乗俘二百五十人馘百人宋大夫狂狡逆鄭人鄭人入於井倒㦸而出之獲狂狡君子曰失禮違命宜其爲擒也戎昭果毅以聽之謂禮常存於耳著於心想聞其政令殺敵爲果致果爲毅易之戮也言易而反之必爲戮矣夫佳兵章第三十一夫佳兵者不祥之器義曰韜者有六龍虎文武豹犬也文者經邦立國不越天常武者克定禍亂威伏八方龍者燮理陰陽不逾時令虎者善用爪牙群凶自挫豹者應時戡難智在權機犬者採聽至微或成奇變三略者亦機鈐用兵之術也漢子房公於圮橋遇黃石公示此書六韜者姜子牙於磻溪釣魚大魚腹中得此書也藏器於身者易下繫曰公用射隼于高墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有隼在高墉則難射人處高位則難除處高位而貪殘如隼將除之者在得其時無不克矣史記曰君子得其時則駕不得其時則蓬累而行是也物或惡之故有道者不處注修辭立誠義曰易乾卦九三之辭謂文教誠謂誠實也不得已而用之䟽經緯天地天生五材義曰南北爲經東西爲緯五材者五行也凶暴及人曰禍反德肆逆曰亂得獲曰克凡曰王師有鐘鼓曰伐無鐘鼓曰侵師出有名曰順無名曰逆吉事尚左凶事尚右䟽禮檀弓曰夫子義曰夫子有妹之喪拱而尚右弟子不知其故因而效之夫子言其好學也如此及知非吉故復尚左檀弓禮記第四篇名也殺人衆多䟽人惟邦本義云書五子之歌也戰勝則以喪禮處之䟽秦伯向師而哭義云春秋僖三十二年秦伯伐鄭秦大夫杞子戍鄭使告于秦曰鄭人使我掌其北門之管籥若潜師而來國可得矣秦伯訪於大夫蹇叔蹇叔曰勞師以襲遠非所聞也師勞力竭遠主備之無乃不可乎師之所爲鄭必知之且行千里其誰不知秦伯辭焉召孟明西乞白乙使出師於東門之外蹇叔哭之曰孟明吾見師之出而不見其入也秦伯使人謂之曰爾何知中壽爾墓之木拱矣蹇叔之子預於師哭而送之曰晋人禦師必於崤崤有二陵焉其南陵夏后皋之墓其北陵文王之所避風雨必死其間余收爾骨焉秦師遂東過周北門左右免胄而下超乗者三百乗王孫滿尚幼觀之言於襄王曰秦師輕而無禮必敗輕則寡謀無禮則脱入險而脱又不能謀能無敗乎及滑鄭商人弦高將市於周遇之以乗韋先牛十二犒師且使遽告于鄭鄭穆公使視客館則束載厲兵秣馬矣使皇武子辭焉吾子淹久於弊邑唯是脯資餼牽竭矣爲吾子之將行也鄭之有原圃猶秦之有具囿吾子取其麋鹿以間弊邑若何杞子奔齊逢孫楊孫奔宋孟明曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也滅滑而還晋原軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其爲死君乎先軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之有吾聞之一日縱敵數世之患也謀及子孫可謂死君乎遂發命遽興姜戎襄公墨縗梁弘御戎萊駒爲右夏四月辛巳敗秦師於崤獲百里奚孟明視食之不厭君何辱焉使歸就戮于秦以逞寡君之志若何公許之先軫問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國隳軍實而長寇讎亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣釋左驂以公命贈孟明孟明稽首曰君之惠不以縲臣舋鼓使歸就戮于秦寡君之以君戮死且不朽若從君惠而免之三年將拜君賜秦伯素服郊次向師而哭曰孤違蹇叔而辱二三子孤之罪也不替孟明孤之過也大夫何罪且吾不以一眚掩大德蹇叔之哭知其師必敗也秦伯之哭哀其師之敗也皆非勝而哭之矣道常無名章第三十二樸雖小天下不敢臣義云春秋曰天有十日人有十等下所以事上也上所以供神也男曰臣女曰妾故王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣隸隸臣僚僚臣僕僕臣臺馬有圉牛有牧以待百事侯王若能守義云王者四海之尊侯者五等之二周設五等之爵先王之制法則有天子諸侯卿大夫士也而王兼在五數也以降甘露義云甘露者神虚之精仁瑞之澤其凝如脂其甘如飴一名天酒天文録曰天乳一星在氏宿北主甘露星明則甘露降也人莫之令而自均䟽自西自東義云詩文王之什文王有聲篇也言武王作邑鎬京行辟雍之禮四方來觀者皆感其德而從之也始制有名義云山林非欲於飛鳥虎狼猶茂盛深密自來歸之江湖非欲於魚鱉蛟龍蓋廣大渺漫自來歸之王侯非欲於有名之物爲道德仁惠自來歸之知人者智章第三十三知人者智義云昔宋宣公捨其子與夷而立其弟如是爲穆公春秋隱三年秋宋穆公疾召大司馬孔父而屬之曰先君捨與夷而立寡人寡人弗敢忘若以大夫之靈得保首領以没先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉孔父曰羣臣願奉公之子憑也穆公曰不可先君以寡人爲賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功乃使其子憑出居鄭以讓與夷而立是爲殤公君子曰宋宣公可謂知人矣立穆公而其子享之命以義夫不失其所者久義云鄭太叔段寵無厭大夫祭仲諫莊公曰不如早爲之所無使滋蔓蔓難圖也蔓草猶不可除况君之寵弟乎莊公不從既而大叔命西鄙北鄙貳于己侵地至于廪延乃完城郭聚人民繕甲兵具卒乗將襲鄭公命大夫子封帥三百乗以伐京大叔入鄢公伐諸鄢五月太叔奔恭遂克之初以莊公之母武姜寤寐而生莊公名之爲寤生遂惡莊公而愛太叔段及段欲襲鄭武姜將啓之至是既克段乃寘武姜于城潁誓之曰不及黃泉無相見也既而悔之潁谷封人考叔因聞之有獻于公公賜之食食捨肉公問之對曰小人有母皆嘗而諫荘公納之小人之食未嘗君之羹請以遺之公曰爾有母遺繄我獨無掘地及泉與武姜隊而相見爲母子如初春秋書曰鄭伯克段于鄢議其失教也此言縱太叔之過使其貫盈而後殺之是不早爲其所失所之致也若太叔不失其所死而不亡者壽義云河圖曰人之生也天之與算四萬三千二百算主日也與之紀一百二十紀主年也此人一期之數也黃庭經云百二十年猶可還過此守道誠爲難唯待九轉八瓊丹要復精思存七元日月之華救老殘此明修之可以延益也䟽單豹張毅者莊子第十九違生篇文也死者天子曰崩諸侯曰薨卿大夫曰卒士曰不禄庶人曰死執大象章第三十五執大象天下往義云候日觀風者昔聚窟洲在巨海之中使者朝貢於漢言於武帝曰臣之國去此三十萬里國中常占候於天若東風入律百旬不休青雲干吕連月不散者中國將有有道之君矣臣國之主所以仰中土而慕道風薄金玉而厚靈物故乃步天林而靖猛獸搜奇韞而出神香濟弱水渡飛沙而朝於闕下艱苦道途十三年矣言遠至邇安將欲歙之章第三十六魚不可脱于淵義云春秋僖二十八年晋文公使楚怒而戰乃執曹侯卑于宋楚果伐宋文公因而戰楚楚師敗績文公復召周襄王于河陽以諸侯見且使王狩故大合諸侯而欲以尊事天子以爲名義自嫌强大不敢朝周喻天王出狩因得盡君臣之禮皆譎而不正之事也仲尼曰以臣召君不可以訓書云天王狩于河陽非其地也若此尚爲譎謬况奸臣小人弄權欺主乎唐玄宗御製道徳眞經䟽卷之二
