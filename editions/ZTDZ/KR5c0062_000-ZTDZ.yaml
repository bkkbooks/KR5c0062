front:
  text: 道德眞經䟽外傳才一
  hash: sha256:f8874e6331dbf580a5738111af41925d5818fded5c24473c7b1dfc738d73f6dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0062_SJB_000-110809c, image: sjb/11/110809c.png}
body:
  text: 太上者起乎無因自玄而出窅兮莫測從有而名隨方出顯不可具陳後末化於殷朝寄胎於商第十八王陽甲十七年庚申之歲託孕於玄妙玉女八十一年至商二十二王武丁九年庚辰之歲降生於亳州衛眞縣今太清宫是降生之所也二月十五曰卯時聖母剖左腋而生其他祥異備具道史道德經古今箋注者多矣見行注者六十餘家開列于後節解上下老君與尹喜解想爾二卷三天法師張道陵所注内解上下尹喜以内修之㫖解注河上翁章句漢文帝時降居陜州河濱今有廟見存嚴君平指歸十四卷漢成帝時蜀人名遵山陽王弼注字輔嗣魏時尚書即南陽何晏字叔平魏駙馬都尉河南郭象字子玄向秀弟子魏晋時人潁川鍾會字士季魏明帝時人隱士孫登字公和魏文明二帝時人晋僕射太山羊祜字叔子注爲四卷沙門羅什本西胡人苻堅時自玉門關入中國注二卷沙門佛圖澄趙時西國胡僧也注上下二卷沙門僧肇晋時人注四卷梁隱居陶弘景武帝時人號貞白先生注四卷范陽廬裕後魏國子博士名白頭翁注二卷草萊臣劉仁會後魏伊州梁縣人注二卷吴郡徴士顧歡字景怡南齊博士注四卷松靈仙人隱青溪山無名氏年代晋人河東裴楚恩注二卷秦人京兆社弼注二卷宋人河南張憑字長宗明帝太常博士注四卷梁武帝蕭衍注四卷證以因果爲義梁簡文帝蕭綱作述義十卷清江張嗣注四卷無年代梁道士臧玄靜字道宗作䟽四卷梁道士孟安排號大孟作經義二卷梁道士孟智周號小孟注二卷梁道士竇略注四卷與武帝羅什所宗無異隋道士劉進喜作䟽六卷陳道士諸糅作玄覽六卷隋道士李播注上下二卷唐太史令傅弈注二卷并作音義唐嵩山道士魏徴作要義太宗丞相法師宋文明作義泉五卷仙人胡超作義䟽十卷西山得道道士安丘作指歸五卷道士尹文操作簡要義五卷法師韋録字處玄注兼義四卷道士王玄辯作河公釋義十卷諫議大夫肅明觀主尹愔作新義十五卷道士徐邈注四卷直翰林道士何思遠作指趣二卷玄示八卷衡岳道士薛季昌作金繩十卷事數一卷洪源先生王鞮注二卷玄珠三卷㫖訣二卷法師趙堅作講䟽六卷太子司議郞楊上善高宗時人作集注眞言二十卷道士車弼䟽七卷任眞子李榮注上下二卷成都道士黎元興作義四卷太原少尹王光庭作契原注二卷道士張慧超作志玄䟽四卷龔法師作集解四卷通議郡道士任大玄注二卷道士冲虚先生殿中監申甫作䟽五卷岷山道士張君相集解四卷道士成玄英作講䟽六卷漢州刺史王眞作論兵述義上下二卷道士符少明作道講策二卷玄宗皇帝所注道德經上下二卷講䟽六卷即今所廣䟽矣所釋之理諸家不同或深了重玄不滯空有或推因果偏執三生或引合儒宗或趣歸空寂莫不并探驪室競掇珠璣俱涉鍾山爭窺珪瓚連城在握照乗盈懷敷弘則光燦縑緗演暢則綵文編簡我開元至道昭肅孝皇帝降神龍變接統象先戡内難以乗乾啓中具而御極無爲在宥四十五年汾水襄城靡勞轍迹具茨大隗自得明遊廓八溟爲仁壽之庭普萬㝢爲華胥之國至道至德超哉明哉欽若尊經本朝家教象繫不可以擬議風雅不足以指陳横亘古今獨立宇宙雖諸家染翰未窮衆妙之門多士研精莫造重玄之境凝旒多暇屬想有歸躬注八十一章製䟽六卷内則修身之本囊括無遺外即理國之方洪纖畢舉宸藻遐布奪五雲之華天光焕臨增二曜之色固可以季仲十翼暉映二南禀若親於玄元信躬傳於太上冠九流而首出垂萬古而不刊則大風朱雁之歌誠難接武典論金樓之作詎可同年但以䟽注之中引經合義周書魯史互有發明四始漆園或申屬類後學披卷多瞢本源輒採摭衆書研尋篇軸今於御注䟽内餘事略録于後開元十一年躬爲注解序云詔曰詔者敕命之書也在天子爲詔爲誥爲敕爲制在皇后太子諸王爲教爲令皆君上命下之詞也詔啓迪來裔啓開也迪進也頗者甚也䟽序曰馬遷謂之隱君子馬遷者司馬遷也字子長河内温人中山王相司馬喜之孫太史令談之子顓頊之裔生于龍門年十歲誦古文尚書年二十歲遊江淮九疑禹穴之門仕漢爲郞中使西蜀父卒歲餘爲太史令而作史記也道德分上下者開元二十一年頒下其所分别上卷四九三十六章法春夏秋冬下卷五九四十五章法金木水火土則上卷從一至九章以無形無名爲宗明春道從十至十八章以無知恍惚爲宗明夏道從十九至二十七章以有情有信爲宗明秋道從二十八至三十六章以凝重清淨爲宗明冬道其下卷自一盡九明仁德次十盡十八明禮德從十九盡二十七明義德從二十八至三十六明智德從三十七至盡四十五明信德也
