front:
  text: 唐玄宗御製道德眞經䟽卷之四才四
  hash: sha256:96c20d6f2522d5a19b54594881da48b897a11318966736af0ec191a1a43e620b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0062_SJB_004-110836b, image: sjb/11/110836b.png}
body:
  text: 含德之厚章第五十五骨弱筋柔而握固義云春秋鄖音云人伐楚屈瑕患之鬭廉對屈瑕曰師克在和不在衆商周之不敵君所聞也屈瑕欲卜之曰卜以决疑不疑何卜敗鄖師於蒲騷以政治國章第五十七以奇用兵䟽兵猶火也義云春秋隱四年春衛公子州吁弑其君完初衛莊公娶于齊東宫得臣之妹曰莊姜美而無子衛人爲賦碩人之詩娶于陳曰厲嬀生孝伯早死其娣戴嬀音龜生桓公莊姜以爲己子公子州吁嬖人之子也有寵而好兵弗禁莊姜惡之石碏諫曰臣聞愛子教之以義方不納于邪驕奢淫佚所自邪也四者之來寵禄過矣將立州吁乃早定之若猶未也階之爲禍夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣且夫賤妨貴少凌長遠間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以遠禍也君人者將禍是務去而速之無乃不可乎弗聽石碏之子厚與州吁遊禁之不可桓公立碏乃老二月戊申州吁弑桓公而自立將修先君之怨於鄭而求寵於諸侯以和其民使來告於宋曰君若伐鄭以除君害君爲主弊邑以賦與陳蔡從則衛國之願也宋人許之於是陳蔡將睦於衛故宋與陳蔡衛伐鄭圍其東門五日而還宋公乞師於魯魯辭之隱公問於衆仲曰州吁其成乎對曰臣聞以德和民不聞以亂理亂理亂猶理絲而棼之也夫州吁弑其君而虐用其民不務令德而欲以亂成必不免也州吁未能和其民厚問定君於石子石子曰王覲爲可曰何以得覲曰陳桓公方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰衛國褊小老夫耄矣無能爲也此二人者實弑寡君敢即圖之陳人執之而請莅於衛九月衛人使右宰醜吁于濮石碏使其宰獳乃侯切羊肩殺石厚于陳君子曰石碏純臣也惡州吁而厚預焉大義滅親其是之謂乎所謂子從殺君之賊國之大逆不可不除故云大義滅親明小義則兼愛其子也人多伎巧義云春秋丹桓官之楹刻桓宫之桷角椽也書而譏之臧文仲山節藻棁也法令滋彰義云禮運曰大道既隱天下爲家城郭溝池以爲固禮義以爲理故謀用是作而兵由此起法令滋彰盜賊多有春秋曰夏有亂政而作禹刑殷有亂政而有湯刑周有亂政而作九刑三辟之具皆叔世也民是以亂免而無耻也其政悶悶章第五十八禍兮福所倚福兮禍所伏義云齊有仲孫之難而桓公興遂霸其國晋有里克之難而文公作而把諸侯是二國因禍而昌也衛方寧靜狄人滅之邢方晏安衛人滅之是二國無禍而喪也故伏藏因倚莫知其極故春秋云有禍而啓其疆土無禍而喪其守宇不可知也其無正邪義云側身修德雊雉不足以貽灾坦慮忘懷失馬未必以爲禍悔吝無凖召之由人焉治人事天章第五十九治人事天䟽粢盛豐備義云春秋桓公六年楚武王侵隨使其大夫薳音葦章求成焉軍於隨之瑕地以待之隨人使少師董成鬭伯比言於楚子曰吾不得志於漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼矣而和協以謀我故難問也漢東之國以隨爲大隨張必棄小國小國離楚之利也少師侈請羸師以張之熊率音律且子余切比曰隨賢臣季良在何益鬭伯比曰以爲後圖季良諫不過一見從少師得其君心行少師之計王毁軍而納少師少師歸請追楚師隨侯將許之季良止之曰天方授楚楚之羸師誘我也君何急焉臣聞小之能敵大也小道大淫所謂道者忠於民而信於神上思利民忠也祝史正詞信也今民餒而君逞欲祝史矯舉以祭臣不知其可也隨侯曰吾牲牷肥腯音突粢盛豐備何則不信對曰夫民神之主也是以聖王先成民而後致力於神故奉牲以告曰博碩肥腯謂民力之普存也謂其畜之碩大蕃滋也謂其不疾瘀音族蠡力果切也謂其備物咸有也奉粢盛而告曰潔粢豐盛謂其三時不害而民和年豐也奉酒醴以告曰嘉栗㫖酒謂其上下皆有嘉德而無違心所謂馨香無讒慝也務其三時修其五教親其九族以致其禋祀於是乎民和而神降之福故動則有成今民各有心而鬼神乏主君雖獨豐其何福之有君姑修政而親兄弟之國庶免於難隨侯懼而修政楚不敢伐矣三時者春耕夏種秋收農之三時也夫惟嗇注何以聚人曰財義云易下繫云天地之大德曰生聖人之大寳曰位何以守位曰仁何以聚人曰財財所以資生者也可以有國䟽易曰王假有廟有家是也義云有國者車軌所及書文所同人服其德遠懐其化可以謂之有國矣或以武威所制詭道所臨苟有其邦人所未服或承平統曆嗣位守國厥德有愆恩化不浹者皆非謂其國矣王假有廟有家者易萃卦云王假有廟致孝享也假聚也王以聚人至於有廟有廟乃以能致其孝享故曰利見大人聚以正也觀其所聚則天地萬物之情可見矣天下崩離則民怨雖有享祀與無廟同王至大聚之時孝德乃洽始可謂之有廟矣王假有家者易家人卦九五辭云王假有家勿恤象曰王假有家交相愛也王能有家道在下莫不化之天下既化六親和睦故曰交相愛也涣卦亦有王假有廟其義同也是謂深根固蒂長生久視之道義云人君以道德養生靈以儉嗇理天下豐財則國富積德則祚隆遠近歸心華戎率服又能母養萬物子愛群生根深則祚曆無疆蒂固則子孫延永長生久視奕葉重光治大國章第六十非其鬼不神其神不傷民䟽春秋曰其氣焰以取之義云春秋莊十四年夏鄭厲公自櫟侵鄭及大陵獲大夫傅瑕瑕曰苟舍我我請納君與之盟而赦之六月甲子傅瑕殺鄭子儀及其二子而納厲公初鄭有祅焉内蛇與外蛇鬭南門之中内蛇死六年而厲公入公聞之問於申繻曰猶有祅乎對曰人之所忌其氣焰以取之言若火焰焰未成而進退之時以喻人心不堅正也妖由人興人無舋焉妖不自作人棄常則妖興故有妖厲公入遂殺傅瑕使謂原繁曰傅瑕貳周有常刑既伏其罪納我而無二心者吾皆許之上大夫之事吾願與伯父圖之且寡人出伯父無裏言入又不念寡人社稷有主而外其心寡人憾焉對曰先君桓公命我宗人典司宗祏石廟主也社稷有主而外其心其何貳如之苟主社稷國内之民其誰不爲臣臣無二心天之制也子儀在位十四年矣而謀召君者庸非二乎莊公之子猶有八人若皆有官爵行賂勸貳而可以濟事君其若之何臣聞命矣乃縊而死夫兩不相傷故德交歸焉䟽人爲神主義云春秋僖十九年宋桓公使邾文公用鄫音繒子於次睢之社司馬子魚曰古者六畜不相爲用小事不用大牲而况敢用人乎祭祀所以爲人也夫人神之主也用人其誰享之齊桓公存三亡國者以屬諸侯義士猶曰薄德今君一會而虐二國之君言執滕子用鄫子也又用諸淫昏之鬼將以求霸不亦難乎得死爲幸恐其亡國也子魚宋公子目夷也睢水自汴入泗而有祅神東夷殺人以祭之焉六畜不相爲用者如祭馬祖不可用馬况用人乎今聖人以道育之鬼神交福兩不相害可謂玄德乎大國者下流章第六十一義云春秋昭三十年鄭遊吉對晋大夫士景伯曰小國事大在恭其時命大國字小在恤其所無先王之制也取備而已所以交其好也此固大國切於用謙不在乎以大制小也故大國以下小國則取小國義云春秋襄十四年大國能安撫小國如晋爲盟主而衛國逐其君而立剽晋欲討其罪晋侯問故於中行獻子偃對曰不如因而定之伐之未必得志而勤諸侯史佚有言曰因重而撫之仲虺有言曰亡者撫之亂者取之推亡固存國之道也君其定衛以待時乎冬會于戚以謀衛此所謂大國之撫小國也又大國之聚小國者謂群方朝會無代無之故夏啓有鈞臺之享在河南也商湯有景亳之命在偃師也周武有孟津之誓成王有岐陽之蒐康王有酆宫之朝在鄠杜也穆王有塗山之會在壽春也齊桓有邵陵之師晋文有踐土之盟皆以大國恤下小國事上各得其所也大國不能撫小國者文十七年如晋侯不能字育諸侯强令於鄭鄭子家與趙宣子書曰古人有言畏首畏尾身其餘幾又曰鹿死不擇音小國之事大國也德則其人不德則其鹿也鋌而走險急何能擇此言晋若虐命於鄭鄭將庇於楚矣命之罔極亦知亡矣將悉弊賦以待於儵音叔晋之境也居大國之間而從於强令豈其罪也此由大國不能撫懷于小將致其叛故大國之于小國當謙和以下之柔靜以懐之取言聚也以聚於人也小國以下大國則取大國義云小國不能致禮竭誠奉事大國者僖公二十一年如宋人爲鹿上之盟以求諸侯于楚楚人許之宋公子目夷曰小國爭盟禍也宋其亡乎幸而後敗及盟目夷曰禍其在兹乎君欲已甚其何以堪之於是楚執宋公以伐宋冬會于亳乃釋之目夷曰禍由未也未足懲君此小國不能事大國也夫小國能事大國者如隱公元年三月邾儀父盟于蔑魯地邾以附庸之君未王命故書名然其小國能通大國繼好息民書字以貴之是也朝聘者大國適小國爲聘大事小也小國適大國爲朝小事大也繼好結信也謀事補闕禮之大也孟子曰唯仁者能以大事小湯事葛伯文王事昆夷是也唯智者能以小事大太王事熏鬻勾踐事吴是也大事小謂之樂天小事大謂之畏天樂天者保天下畏天者保其國詩云畏天之威于時保之此周頌美成王畏天之威能安其太平也故或下以取或下而取䟽春秋曰師能左右之義云春秋僖二十六年秋宋叛楚而善於晋楚令尹子玉司馬子西帥師伐宋圍緡公以楚師伐齊取穀凡師能左右之曰以謂進退在己眞桓公之子雍於榖以爲魯援楚申公叔侯戍之桓公之子七人爲七大夫於楚言齊孝公不能撫之故也二十八年楚子使申叔去穀也此言左右由己取舍因時也大國不過欲兼畜人小國不過欲入事人義云小國求大國爲援助者春秋文十四年秋鄭伯與魯公宴于棐鄭大夫歸生子家賦鴻雁之什取其哀恤鰥寡之義使魯侯恤之又賦載馳之四章言鄭國寡弱取其小國有急欲引大國以爲援助是也兩者各得其所欲故大者宜爲下義云若大國不能爲下或會之以侈示之以忲人必離之夏桀爲有仍之會而民叛之商紂爲黎之蒐東夷叛之周幽爲太室之盟戎夷叛之宋襄爲鹿上之會而諸侯叛之楚子爲申之會而人心去之懷不以德綏不以禮人人各有心其可服乎道者萬物之奧章第六十二道者萬物之奥䟽引西昇經義云西昇經者老君周昭王二十五年癸丑四月於終南之陰尹喜草樓之内授道德二經既畢欲西化流沙尹喜問存三守一之方習道修身之要後以聖言編纂以升入太微西化流沙之義西昇經凡三十六章九百七十二句四千二百七十八言其㫖與道德經相出入言大道甚深甚奥爲虚無之淵藪也故立天子置三公義云四海之大萬有之殷厥初生人不可無主故立天子以牧之天子者尊事上帝父事於天母事於地謂天之子也一人不可以廣理置百官以臨之百官之長有三公焉尚書周官云其惟三公論道經邦太師者智足以爲泉源行足以爲儀表問焉則應求焉則得謂之大師亦曰尚父太言大也爲王之師安車青蓋金印紫綬太傅者訓也保也大戴禮云傅天子以德義若天子無恩於父母不惠于庶人失禮於大臣不中於制獄皆太傅之失職也太保者倚也任也大戴禮云天子處位不端受書不敬言語不序聲音不中律進退即席無升降揖讓之禮皆太保失職也復置三公太尉司徒司空主佐天子理陰陽親萬人廣教化此其職也天工人其代之者書咎繇謨曰一日二日萬機無曠庶官天工人其代之曠空也庶衆也居其位者惟其人非其人則闕之言人代天理官不可以天官爲私用非其材也雖有拱璧以先駟馬䟽春秋云乗韋先牛十二犒師之類是也義云春秋僖三十三年晋師伐鄭及滑鄭商人弦高將市於周遇之以乗韋先牛十二犒師曰寡君聞吾子將出師于弊邑敢犒從者不腆弊賦爲從者之淹止則具一曰之積行則備一夕之衛且使遽告于鄭因有備焉其安易持章第六十四不貴難得之貨䟽外謂珠犀寳貝義云珠者大或徑寸光照十二乗乃古人之所貴也犀者南徼之外有牛重千餘斤一角在鼻端可以爲寳中斷其角有文通達成形象者有辟塵者有辟水者磨而服之可解蠱毒之疾鷄見之夜驚故曰駭雞犀亦今古所貴也金玉珍異草木毛羽衆所奇重者皆曰寳焉貝者出東海中如螺有文有長尺者可以爲寳在海爲介蟲居陸名猋在水名蜬音甘古者貨貝而寳龜周有泉貝到秦廢貝而行錢貝字者象形也今凡貨賄贈賫賞賜賝凡財之屬皆從貝矣古詩曰積財爲累愚明財多累德也古有三幣珠玉爲上黃金爲中刀布爲下帝王以之御四海也古之善爲道章第六十五不以智治國國之福注偃息蕃魏弄丸解難義云偃息蕃魏者段干木爲魏文侯之師以安靜爲先道德爲化故偃息無事而藩屏魏國矣偃者偃仰也息宴息也藩籬屏也弄丸解難者楚白公勝與大夫子西兩家舉兵相伐兩家大夫曰市南宜僚陸沉之士也一人當五百人并遣使往召之宜僚高枕安卧以見二大夫之使卧而不起以兩手弄丸不亡承之以劍不動二大夫之使各還具論宜僚之狀二大夫曰高枕安卧者示我無爲也承之以劍不動者兵不足恃也兩手者喻兩家也丸者形圓無爲之物兩手弄之不止者俱止于困也明兩家稱兵不止必至滅亡二大夫解兵而歸是兩家難解也事見莊子也謂玄德玄德深矣遠矣與物反矣然後乃大順義云大順者本乎人情禮記禮運篇曰人情者聖王之田也故聖王修義之柄禮之序以理人情以情爲田修禮以耕之和剛柔也陳義以種之樹善道也講學以耨之存是去非也本人以聚之合其所成也播樂以安之感動使堅固也理國不以禮猶耜以耕也爲禮不本於義猶耕而不種也爲義而不講之以學猶種之而不耨也講之以學而不合之以仁猶耨之而弗獲也合之以仁而不安之以樂由之而不食也安之以樂而不達之於順猶食之而不肥也夫四體既安膚革充盈人之肥也父子篤兄弟睦夫婦和家之肥也大臣法小臣廉官職相序君臣相正國之肥也天子以德爲車以樂爲御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也是謂大順故天子用民爲順則天不愛其道地不愛其寳人不愛其情衆瑞出焉順之寳也用兵有言章第六十九無兵義云射軛夾脰之失爲號繁弱之弓魚腸昆吾之刀太阿巨闕之劍吴鈎楚矛蜀弩孟勞豈假執持無所用矣五兵者戈矛殳㦸干言有五等也周禮廬人爲廬器凡祕過三其身不能用也祕柄也戈祕長六尺六寸殳長尋有四尺八尺曰尋言一丈二尺也矛常有四尺夷矛長三尋夷長也長二丈四尺平野之兵欲長山林之兵欲短執欲其鋭被欲其堅兵有鼓角金革牙旗斧鉞甲胄旌節旗旟旒旐弓弩弧矢各有制度其大約分爲五等説文曰拱手執斤曰兵莫大於輕敵義云用兵之道敵國在前先伐其謀次料其敵勇怯既等衆寡復均然猶得天之時假地之利揣理之曲直因人之協和或高壘深溝挫孔明之鋭氣焚舟示死雪秦繆之前羞殞長星而告終封殽尸而歸國若不然者則五千深入永悲於雁塞龍堆百萬橫行竟怯於風驚鶴唳晋山草木盡變人形昆陽犀象寧爲我用則謙慈之寳於兹喪矣故抗兵相加哀者勝矣義云夫雖戎狄侵邊豺狼害國奸凶肆孽妖逆亂常推轂命師鑿門授律與民除害不得已而征之猶慮强抗則乖仁故哀慈則合道也民之生章第七十六木强則共義云木以本大居下固其宜然末大於本固非其稱諺曰尾大不掉國之所戒趙氏以之傾晋田氏以之易齊子之致疑于燕太叔見敗於鄭豈非末大於本臣强於君乎理非順也合手曰拱昔桑穀生於殷朝七日大拱秦伯怒於蹇叔墓木拱矣皆合拱也天下柔弱章第七十八天下柔弱莫過於水義云水之爲用其體至柔其性善下萬川委輸百谷朝宗霏霧露以凌虚貫昭回而上漢言其大也古今注海而不盈言其細也毫末禀生而有潤故老君配之於道焉三能不讓七德備周包裹造化貫穿形兆處濁受污隨方任圓此其至柔也故物莫能傷焉及其泛十洲浮八極淪藏曰月涵貯乾坤陵谷由之而革遷鯤鵬託之而變化摧山穴石無所不能此其至强也故物莫能制焉是謂社稷主義云社稷者帝王立國左宗廟右社稷而爲王矣宗廟者尊祖配天之位也社稷者尊稼穡備粢盛爲生民粒食之本也唐玄宗御製道德眞經䟽卷之四
