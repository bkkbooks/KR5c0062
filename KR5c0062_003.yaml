front:
  text: 唐玄宗御製道德真經疏卷之三才三
  hash: sha256:b2a16f2e3ad51ddef6947ebd69c7947f8be349f70ed4c9b7ed840e25ba590223
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0062_HFL_003-001a, image: hfl/0358/0358-132.png}
body:
  text: 上德不德章第三十八上仁為之而無以為義云小惠未孚者春秋莊十年魯人曹劇對魯公之語也是歲正月公敗齊師于長勺將戰曹劇請見其鄉人曰肉食者謀之又何問焉劇曰肉食者鄙未能遠謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未遍民弗從也公曰犧牲玉帛弗敢加也必以信對曰小惠未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰戰則請從公與之乘戰于長勺公將鼓之劇曰未可齊人三鼓劇曰可矣齊師敗績公將馳之劇曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再鼓衰三而竭彼竭我盈故克之夫大難測懼有伏焉吾視其轍亂望其旗靡故逐之上禮為之疏曲為之防義云制禮以防民曲也故失道而後德義云春秋昭二十六年晏子對齊景公曰禮之為國為國與天地并君令臣恭父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣恭而不二父慈而教子孝而針兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉謂之善物也公曰善哉寡人而今而後聞此禮之上也對曰先王所稟於天地以為其民也是以先王上也則理世之道禮為急矣昔之得一章第三十九侯王得一以為天下正義云春秋曰今之王古之帝也昔堯舜之前皆稱為帝舜授於禹禹以謙讓自云德不及帝故去帝稱王亦云禹沒襌位於益禹之子啓居于箕山啓賢故諸侯去益而朝啓禹雖有襌益之名而天下之人皆歸於啓啓以德不及五帝乃自稱王自是之後皆以王為號至秦併天下吞滅諸侯獨為一統乃上採三皇下兼五帝通為皇帝之號焉今之王爵居五等之上漢法非劉氏不王非功臣不侯自是相承以天子之衆子為王嫡為太子自周有天下王之子為王子之孫為王孫國朝定法以皇帝之孫姪為郡王承嗣者為嗣王異姓有功者封王或錫以美號或封郡王然皆無列土之位矣天無以清義云晉惠帝元康年中人君德衰天示災變天裂數丈殷然有聲是失沖和之道也自此西晉版蕩惠帝哀帝皆罹其咎地無以寧義云史記云周幽王二年辛酉西周三川皆震岐山崩春秋二百四十二年地震有五又有梁山崩沙鹿崩石言算妖異洎秦漢已降不可勝紀大則淪陷城邑小則摧圮廬舍也神無以靈義云春秋僖三十二年七月神降于莘虢公享之周惠王河內史過曰是何故也對曰國之將興明神降之鑒其德也將亡神亦降之觀其惡也故有得神以興亦有得神以亡虞夏商周皆有之矣虢多涼德其將亡乎後虢國遂滅昔河神為虐娶女于人西門豹投巫於河其害遂息谷無以盈義云老君曰伊雒竭而夏亡河竭而商亡周幽王辛酉川竭山崩周亡之徴也亡不過十年數之紀也數及於十紀猶極也十一年庚申西周為犬戎所滅平王東遷是也侯王無以貴高義云侯則晉靈公夷皋宋昭公杵臼齊懿公商人陳靈公平國是也王則夏之太康殷之武乙周之幽厲漢之桓靈是也疏天生萬物惟人為靈義云書太誓篇文也故貴以賤為本疏民惟邦本詩云愷悌君子義云尚書五子之歌也愷悌者詩大雅泂酌篇之詞也是以侯王自謂孤寡不穀疏孤與二三臣悼心失圖義曰孤與二三臣者春秋昭七年二月楚子成章華之臺願與諸侯落之宫室始成祭之為落也太宰蒍音委啓疆曰臣能得魯侯薳音委啓疆來召公辭曰昔先君成公命我大夫嬰齊曰吾不忘先君之好將使衡父照臨楚國鎮撫其社稷以輯寧爾民嬰齊受命于蜀盟盟在成二年奉承以來弗敢失殞而致諸宗祧自我先君恭王引領北望日月以冀傳序相授于今四王矣謂恭康郟敖靈王也嘉惠未至唯襄公之辱臨我喪孤與二三臣悼心失圖社稷之不遑况能懷思君德今君若步玉趾辱見寡君寵靈楚國以信蜀之役致君之嘉惠是寡君既受貺矣何蜀之敢望其先君鬼神實嘉賴之豈惟寡君君若不來使臣請問行期寡君將承贄帛而見于蜀以請先君之貺公將往夢襄公祖梓愼曰公不果行襄公之適楚也夢周公祖而行今襄公實祖君其不行子服惠伯曰行先君未嘗適楚故周公祖以導之襄公適楚矣而祖以導君不行何之三月公如楚鄭伯勞于師之梁孟僖子為介不能相義及楚不能答郊勞四月享公于新臺使長鬛者相好以大屈之弓既而悔之蒍啓疆聞之見公公語之拜賀公曰何賀對曰齊與晉越欲此久矣寡君無適與也而傳諸君君其備禦三鄰愼守寶矣敢不賀乎公懼乃及之此言楚靈無信所以不終也九月公自至楚孟僖子病不能相禮乃講學苟能禮者從之遂令南宫敬叔已下學禮於孔子孔子與敬叔適周問禮於老子焉疏稱寡人者即先君以寡人為賢之例是也義云如上經第三十三知人者智所解更不重録疏稱不榖者即不穀惠其無誠德之例是也義云春秋十一年秦晉為成將會于令狐晉侯先至秦伯不肯涉河晉厲公秦桓公也秦伯次于王城使大夫史顆盟晉侯于河東晉郤犫盟秦伯于河西范文子曰是盟也何益齊盟所以質音致信也會所以信之始也始之不從其可質乎秦伯歸而背晉成十三年四月戊午晉侯使吕相絶秦時秦桓公既與晉厲公為令狐之盟而又召狄與楚欲導之以伐晉諸侯是以睦賔于晉吕相語秦伯曰楚人惡君二三其德亦來告我曰秦背令狐之盟而來求盟干我昭告皇天上帝秦三公楚三王曰余雖與晉出入余惟利是親不穀惡其無誠德是以宣之以懲不一諸侯備聞此言斯是用痛心疾首昵就寡人寡人率以聽命唯好是求君若惠顧諸侯而賜之盟寡人承寧諸侯以退君若不施大惠寡人不佞不能以諸侯退矣敢盡布之執事俾執事實圖之晉欒書士燮韓厥趙旃將四軍郗毅御戎欒針為右五月丁亥晉侯以諸侯之師及秦師戰于麻隧秦師敗績獲秦成羌及不更汝父此言秦伯背盟秦曲晉直有所敗也上士聞道章第四十一進道若退義云李意期乞食于人寰陰長生受辱于都市侯道華寓迹于傭保皇甫獺示疾于丘林聲子佯狂壺公韜晦皆卑躬損志乃翥景沖真也廣德若不足疏良賈者義云史記云孔子與南宫敬叔適周問禮於老子老子曰子之所言其人骨巳朽矣獨其言在爾吾聞之良賈之深葳若虛君子之盛德容貌若愚去子之驕氣與多欲態色與淫志皆無益于子之身吾所以告子者若是也大方無隅疏磨而涅而者義云論語陽貨篇也大器晚成義云備物之用曰器者春秋定九年夏陽虎歸寶玉夏后民之璜封父之繁弱大弓書之曰得器用也凡獲器用曰得得用曰獲故器者備物之用也故物或損之而益疏書云滿招損者義云尚書大禹謨之辭也強梁者不得其死疏嚴仙人義云蜀郡嚴遵字君平常於成都匝以卜筮之道潛化於人人有不正之問必以陰陽之理制而止之日閲百錢而閉肆下簾作道德經指歸十四卷天下之至柔章第四十三不言之教疏九流百氏義云九流者漢書云道家流者使人精神專一動合無形贍足萬物其為術也因陰陽之大順與時遷徙應物變化本清虛以自守卑弱以自持此人君南面之術也儒家流者蓋出司徒之官助人君明教化祖述堯舜憲章文武宗師仲尼以重其言於道最高此其所長也或失精微而僻又隨時抑揚違離道本苟以譁衆取容後進僻儒之患名家流者蓋出於春官名位不同禮亦異數子曰必也正名乎此其所長也及徼為之則苟鈎釽析辭而已為君者愼器與名故曰惟名與器不可以假人縱橫流者蓋出於行人之官子曰使於四方不能專對又曰使乎使乎言當權事制宜受命不受辭此其所長也邪而為之則尚詐而棄其信矣雜家流者蓋出於議官合儒墨兼名法此其所長也蕩而為之則羡無歸心矣農家流者蓋出於農官播五穀以足衣足食洪範八政其一曰食此其所長也鄙者為之欲使君子并耕矣小説家流者蓋出於稗官稗小米也王者欲知風俗立稗官采街談巷議之説子曰雖小道必有可觀致遠恐泥此亦芻蕘狂夫之義也墨家流者出於清廟之宇茅屋采椽兼受選士敬者為推也陰陽家流者出於天官五行之説使人多拘忌也兵家流者出於司馬之官所以威不軌而昭文德兼弱攻昧以遏亂略以靖四國此其威也百氏者六經正史之外自為迷作自周以來立理著書凡百餘人皆稱曰子子者男子之通稱也不敢侔於六經皆目之曰子為論為記為書或以姓氏立稱或以因時表號則有鬻子曾子晏子孟子管子孫卿子魯連子列子莊子庚桑子王孫子尹文子公孫尼子吕氏春秋鄧析音昔子鬼谷子之例是也名與身章第四十四名與身孰親義云伯夷死於仁聶政死於義尾生死於信荆軻死於勇龍逄死於諫伍員死於忠介推死於怒是皆名顯身殁形骨飄零披面剖心火焚水溺齒劍抉眼自取滅亡甚愛必大廢多藏必厚亡疏劍玉賈害譬諸懷璧詩禮發冢祇為含珠義云劍玉者春秋桓十年虞公之弟虞叔有玉虞公求之弗與既而悔之曰周諺有之匹夫無罪懷璧之罪吾焉用此其以賈害也乃獻之又求其寶劍叔曰是無厭也無厭將及我恐將殺我也遂伐虞公虞公出奔洪池詩禮發冢者莊子外篇之辭也大成若缺章第四十五躁勝寒靜勝熱義云天元經云立夏之後日行于地北入地少故夜短而晝長為熱立秋之後日行于地南入地多故夜長而晝短為涼日行去極遠近不同有暄涼寒暑之異是則寒暑躁靜陽氣之所運也若夫用道之君無為致理政靜而物泰國安而人康四表來王五兵不用清虛凝寂澄默恬和姦詐不敢侵強梁不敢暴烽燧不起鼙柝不驚海內晏如此靜而勝矣及其化之至則謳歌洽敬讓興九旋雍和四門穆穆制禮作樂舉賢用能梯航屬望而來庭書軌順規而稟化八表麏至群方駿奔天地感通人神交暢熙熙然一變於道內絶窺窬之孽外無伺隙之鄰歌之咏之舞之蹈之此靜理無為之所致也若其君以躁辨臣以詐欺動搖甲兵振耀威福強師百萬北登單于之臺旌旗千里東涉浿遼之岸老弱被勞役婦女助轉輸四海沸騰六合搔擾及其人之弊也户口減耗生靈轉移野絶人煙晝聞鬼哭此躁勝之所致也天下有道章第四十六義曰夫聖人之御宇也負斧扆而南面前巫後史卜筮瞽侑列于左右無為而守至正也三公在朝三老在學百辟奉職修文德以懷遠敷道化以育人使俗洽和平家興禮讓來琛於四塞息征戍於三邊倒載干戈休牛歸馬然後樂耕耨糞田疇多稼如雲餘糧栖畝苟或違此則怨敵交侵戎馬載馳甲兵復用此無道之所為也天下有道却走馬以糞義曰古人有言曰君猶舟也人猶水也人非君不理舟非水不行舟水相須不可暫失故理國之本養人為先有道之君守在四夷外無兵寇戈楯不用鋒鏑不施却甲為於三邊闢田疇於四野深耕淺種家給國肥食為人天務之大務也禮記云人者天地之德陰陽之交鬼神之會五行之秀故聖人作則必以天地為本陰陽為端四時為柄日星為紀鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜故人情者聖王之田也情田無為幾於道矣天下無道戎馬生於郊義曰理國不以道則開拓邊土侵伐戎夷封域不寧征役無已或貪蒟醬起番禹之役好名馬起大宛之師骨壅窮荒血塗草莽營魄流飄於異域戎車淪滯於遠郊綿歲月以長征及瓜時而不反轉輸莫息杼軸甚空人怨國亡禍非天與所宜深戒也豈若宇內不擾諸侯咸賔君民協和上下相保使壯士無所施其力辨士無所衒其詞武士無所鋭其鋒智士無所申其策鑄劍戟以為犁鋤貨佩刀而市耕犢無為無役以全永圖罪莫大於可欲義云春秋曰僖二十年宋襄公欲合諸侯魯大夫臧文仲聞之曰以欲從人則可以人從欲鮮濟言屈己欲從衆善也明年宋公為鹿上之盟宋公子目夷曰小國爭盟幸而後敗是年秋楚人執宋公遂伐宋此言以人從欲乖其道也咎莫大於欲得義云老君悔過經云初犯為罪亦名為過過言誤也犯過一千八十為禍禍重於罪矣犯千二百六十過為咎咎又重於禍矣不出戶章第四十七不為而成疏凝神端扆義云凝靜也端莊肅也扆龍屏也謂倚也形若屏風畫為斧文於明堂之中牖間而設之昔周公輔成王於明堂以朝諸侯負斧扆南面而立以正君臣之位為學日益章第四十八為學日益義云學者覺也悟也言以先王之道開導情性使覺悟也幼則昏迷而不悟未可以學長則捍格而難入不可以教學有三時一就人身中為時者十三歲之後可以習業也故學記云發然而後禁則捍格而不勝時過而後學則勤苦而難成二就年中為時者內則云人之養子六年教之數一到十十至百千萬也與方名東西南北也七年男女不同席不共食八年出入門户及即席飲食必後於長者教之讓也九年教之數日朔望與甲乙到壬癸六甲也十年出就外傅居宿於外學書計十有三年學舞勺誦詩背文而讀曰誦也十五年成童舞象學射御先舞籥籥似笛執而文舞也後舞象武舞也二十四而冠始學禮三十有室理男事學無方四十而仕出謀發慮五十服冠政是也三就日中為時者言隨時節氣受業易入王制曰春夏習詩雅言春夏是陽陽體清詩樂是聲聲以輕清故也秋冬習書禮秋冬是陰陰體重書禮是事事以重濁故也以輕清之時習輕清之業以重濁之時習重濁之事故其氣相感皆易入也出生人死章第五十動之死地十有三義曰人之稟生有三業十惡三業者一身二心三口業也十惡者身業有三惡一殺生二偷盜三邪淫心業亦有三惡一貪欲二嗔怒三愚癡口業有四惡一兩舌二惡口三妄言四綺語此三業十惡合為十有三矣制則生縱則死矣此十惡中各有四緣皆為煩惱根何者殺生罪中有四種緣一實是衆生二起衆生想三有欲殺心四令斷他命偷盜罪中亦有四緣一實是他物二起他物想三有欲盜心四使移本處邪淫罪中亦有四緣一實是邪境二起邪境想三發邪淫心四身受染樂事兩舌罪中亦有四緣一是所聞人二起前人想三起離間情四發分構語惡口罪中亦有四緣一是所罵人二起前人想三起惡罵心四發惡罵語妄言罪中亦有四緣一是所欺人二起前人想三有欺妄心四成虛違説綺語罪中亦有四緣一是所詐人起二前人想三發綺語心四吐非義語凡此十惡業計五十三條陸行不遇兕虎義曰瀟水湘水出九嶷零陵其地有犀兕焉昔晉人郭文字文舉栖於餘杭大滌山與虎同處每出城市虎必隨之人或問之曰先生有道乎何摯獸之馴擾若是也文舉曰人無害獸之心獸無傷人之意亦何術也虎無所措其爪義云神仙傳劉剛字伯鸞與妻樊夫人俱得神仙之道剛為上虞令遊四明山遇虎虎見剛俯伏不敢起以語夫人夫人徑往以繩繫虎而歸如家犬焉蓋道德所攝也天下有始章第五十二見小曰明疏憂悔吝者易繫辭也使我介然章第五十三帶利劍義云武備者春秋定十年夏與齊景公會于夾谷孔子攝行相事曰臣聞有文事者必有武備有武備者必有文備諸侯出疆必具官從請具左右司馬定公從之會所為壇位土階三等以遇禮相見揖讓而登獻酬已畢齊使萊人以兵鼓譟劫定公孔子歷階而進不盡一等以公退曰士兵之吾兩君為好而裔夷之俘敢以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於德於為愆義於人為失禮君必不然齊侯心怍麾而避之有頃齊侯奏宫中之樂倡優侏儒戲於公前孔子趨進歷階而上不盡一等曰匹夫而熒侮諸侯者罪應誅請有司速加法焉於是斬侏儒手足異處齊侯懼有慚色既盟諸侯歸責其群臣曰魯以君子之道輔其君而子獨以夷狄之道教寡人使寡人得罪於魯君乃歸所侵魯鄆歡龜陰之田此文事武備也善建者不拔章第五十四善建者不拔疏使儀刑作孚義云詩大雅曰儀刑文王萬邦作孚孚信也文王以道垂化萬邦歸信也修之家疏易曰積善之家義云易坤卦文言也修之天下義云天子味道耽玄敬天順地凝心玄默端己無為書軌大同梯航入貢四夷款附萬國來王道無不被其德周普矣廟堂者天子政事之所也德施普者易乾卦象曰見龍在田德施普也以天下觀天下義云君不修則桀紂是也生人塗炭寰海叛離骨肉仇讎肝腦塗地雖有謀臣武士不能用也雖有金城湯池不能守也以萬乘之貴希匹夫之生不可得也君修之則堯舜是也四海之內比屋可封慈惠浹於殊庭正朔頒於萬宇雖有水旱之災年不害也雖有征伐之師人不怨也唐玄宗御製道德真經疏卷之三
