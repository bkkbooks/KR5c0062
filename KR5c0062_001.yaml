front:
  text: 唐玄宗御製道德眞經䟽卷之一
  hash: sha256:83e1283226507e196e16b3c2490d2e7b669fd737effbfe118ae1ba888434f646
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0062_HFL_001-001a, image: hfl/0358/0358-024.png}
body:
  text: 道可道章第一道可道非常道䟽道以虚通爲義常以湛寂得名所謂無極大道衆生正性也而言可道者即是名言謂可稱之法也雖復稱可道宜隨機愜當而有聲有説非眞常凝寂之道也常道者不可以名言辯不可以思慮知妙絶希夷理窮恍惚故知言象之表方契凝常眞寂之道可道可説者非常道也名可名非常名䟽名者教也前言可道盛明於理今言可名次顯於教眞理既絶於言象至教亦超於聲説理既常道不可道教亦可名非常名欲明理教教理不一不異也然至道深玄不可涯量非無非有不斷不常而義有抑揚教存漸頓所以立常以破可故言可道非常道至論造極處無可無不可故玉京經云無可無不可思與希微通無名天地之始䟽始本也虚無至道陶甄萬物二儀三景何莫由斯故指此無名爲物之本無名足可言説明矣有名萬物之母䟽母有名迹也重玄之道本自無名從本降迹稱謂斯起所以聖人因無名立有名寄有名詮無名也方欲子育衆生令其歸本慈悲鞠養有同母義常無欲以觀其妙䟽妙精微也觀照察其己也言人常能無欲無爲至虚至靜者即能近鑒己身之妙道遠鑒至理之精微也常有欲以觀其徼䟽言人不能無爲恬淡觀妙守眞妄起貪求肆情染滯者適見世境之有未體即有之空所以不察妙理之精微唯睹死生之歸趣前明無名有名之優劣此顯有欲無欲之勝負此兩者同出而異名䟽夫所觀之境唯一能觀之智有殊二觀既其不同徼妙所以名異同謂之妙䟽玄者深遠之義亦是不滯之名有無二心原乎一道同出異名異名一道謂之深遠深遠之玄理歸無滯既不滯有又不滯無二俱不滯故謂之玄玄之又玄䟽有欲之人唯滯於有無欲之士又滯於無故説一玄以遣雙執又恐行者滯於此玄今説又玄更祛後病既而非但不滯於滯亦乃不滯於不滯此則遣之又遣故曰玄之又玄衆妙之門䟽門法門也前以一中之玄遣二偏之雙執二偏之病既除一中之藥還遣唯藥與病一時俱消此乃妙極精微窮理盡性豈唯群聖之户牖抑亦衆妙之法門天下皆知章第二天下皆知美之爲美䟽神奇臭腐莊子知北游篇黄帝謂知曰萬物一也是其所美者爲神奇其所惡者爲臭腐長短之相形䟽鳧脛短鶴脛長者莊子駢拇第八篇文也是以聖人䟽凡聖人者略言有五第一得道之聖太上老君諸天大聖是也第二有天下之位兼得仙之聖伏義黄帝顓頊少昊堯舜是也第三有天下之位無得仙之聖殷湯文武是也皆廓清六合不言升天矣第四博贍之聖無天下之位周公孔子制作禮樂垂範百王而無九五之位而皆具天地合德之美也第五有獨長之聖而無博贍之名亦具上衆美者謂伯牙師文爲鼓琴之聖子卿綏明能棋之聖鍾期延州知音之聖韓娥秦青謳歌之聖龔叔文摯智調之聖離朱師曠視聽之聖張芝鍾繇草書之聖今之明者理天下之聖也萬物作而不辭䟽擊壞鼓腹者莊子馬蹄篇文也功成不居䟽日愼一日尚書又也夫功者王功曰勛輔成王業若周公也國功曰功保全國家若伊尹也民功曰庸施法于民若后稷也事功曰勞以勞定國若夏禹也理功曰績制法成理若咎繇也戰功曰多克敵出奇若韓信也今明功者玄功也其功深遠曰玄夫王者不妄於喜怒則刑賞不濫金革不起矣不妄於求取則賊斂不厚供億不繁矣不妄愛惡則用捨必當賢不肖别矣不妄於近侍則左右前後皆正人矣不妄於土地則兵革不出士卒不勞矣不妄於萬姓則天下安矣稠直如髮者詩小雅都人士篇之文也言情性密緻操行正直如髮之本末無降殺也不尚賢章第三不尚賢使民不爭䟽雲從龍風從虎者易乾卦孔子解九五之辭飛龍在天能應感衆物故叙水流濕火就燥雲從龍風從虎各隨其類自相應感而况帝王升九五之位萬國來庭聖人作而萬物睹本乎天者親上本乎地者親下此言水是陰若流於地必就於濕處火是陽若焚於薪必就於燥處言此二物無識無情爲氣相感尚猶如此又龍是水畜雲是水氣龍吟則景雲起虎是威猛之獸風是振動之物虎嘯則谷風生此二物有識有情未若聖人降世飛龍在天聖賢相須萬物交感故廣陳其事爾唐虞在位不乏元凱之臣伊吕升朝自得台衛之望唐者唐堯也號陶唐氏姓伊祈名放勳幼有聖德都於冀年八十六知子丹朱不肖明揚側陋廣求有德遂舉舜而歷試之聘以二女用觀其德二年襌舜舜即位二十八年而堯崩壽一百一十七歲葬濟陰成陽里中謚法翊善傳聖曰堯舜有虞氏歷試二年即帝位二十八年而堯崩舜年三十而徵用攝位二十八年服喪三年爲天子五十年巡狩南方死於蒼梧之野壽一百一十二歲以其子商均不肖命禹嗣位葬於九疑之零陵道學云堯爲太微眞君舜爲太極眞君元凱者有八元八凱昔高辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季狸忠肅恭懿宣慈惠和天下之人謂之八元肅敬也懿美宣遍也元善也高陽氏有才子八人蒼舒隤敳擣戭大臨龍降庭堅仲容叔達齊聖廣淵明允篤誠天下之人謂之八凱齊中也淵深也允信篤厚也愷和也此十六族世濟其美不隕其名堯不信用舉舜爲堯臣舉八元使布五教于四方五教者父義母慈兄友弟恭子孝内平外成高辛帝之後八元之苗裔也乃稷契朱虎熊羆之倫也舉八凱使主后土乃揆百事莫不時叙地平天成高陽顓頊之號八凱其苗裔也及倕禹咎繇益之倫也咎繇字庭堅是矣卨作司徒五教在寬卨在八元中也禹作司空平水土后土地官禹在八凱中矣内平者内諸夏也外成者外戎狄也舜舉十六族而天下理外内和平伊吕者伊即伊尹生於伊水之上空桑之中佐殷爲相以輔太甲謂之阿衡其先伊摯佐湯立社稷致太平伊尹之子伊涉佐太甲之孫太戊三臣之勣著於殷朝也吕者太公望也姓姜字子牙釣於磻磎獲大魚剖之得玉璜中有兵鈐子牙習之年逾八十周文王卜畋渭濱其繇曰非熊非羆唯王者師遂畋獲子牙載之以歸佐周有功初封於吕或封於甫及克殷之後乃封國於齊召康公命太公曰五侯九霸汝實征之以夾輔周室賜太公之履東至于海西至于河南至于穆陵北至于無棣後桓公小白爲諸侯盟主至春秋之末其臣田和遷齊康公于海上乃奪其國焉台衡之望者天子置三公之官以相三台三台六官者太尉司徒司空太師太傅太保也三台六星上中下台各二星在紫微星之南以拱衛帝座起文昌抵太微天階主三公九卿士庶九州色明而行列相類則君臣和法令平從上台至中台十六度中台至下台十六度二星間相去半度柝則爲奢狹則爲迫又上星主天子中星主伯子男狄人下星主卿大夫小勾而明白吉揺動變色凶一星去天下危二星去天下亂三星去天下不可理矣太師者師範一人儀刑萬國太傅者教以德義太保保衛其身太尉掌武統兵司徒敬敷五教司空主平水土謂斯三公上應三台也阿衡者阿倚也衡平也天子倚三公以平正天下不貴難得之貨䟽不仁之人决性命之情而饕貴富者此莊子駢拇第八篇之文也不見可欲使心不亂義云小隱於山大隱於廛未能絶欲恐境所牽仍栖遁山林以避所見及其澄心息慮想念正眞外無撓惑之縁内保恬和之志雖營營朝市名利不關其心碌碌世途是非不介其意混迹城市修損於修眞乎虛其心䟽虚室生白者莊子人間世篇之文實其腹注屬厭而止者春秋傳自没汝寬諫魏武子之詞也春秋者魯史記之名也記事者以事系日以日繫月以月繫時以時繫年年有四時故錯舉以爲名也天子有史官諸侯有國史楚謂之檮杌晋謂之乗魯謂之春秋孔子述經左丘明爲傳起周平王四十八年魯隱公元年太歳丁巳歲星在降婁當晋鄂侯二年衛桓公完十三年蔡宣公考父二十八年鄭莊公寤生二十二年曹桓公終生三十五年齊僖公禄父九年楚武王達十九年秦文公四十四年宋穆公和七年陳桓公鮑二十三年燕穆公十八年乃春秋之始年至魯哀公十四年周敬王三十九年太歲戊午凡二百四十二年歷周一十四王魯一十二公行事當晋定公午三十一年衛出公輒十二年蔡成公怡十年鄭聲公勝二十年齊簡公嘉四年楚惠王章八年秦悼公十一年宋景公頭曼三十六年陳閔公越二十一年燕敬公六年吴夫差十五年乃春秋獲麟絶筆之年也其書凡三十卷三十五萬二千二十五言十九萬四千五百九十字本十五萬七千九百六十六字解晋征南將軍社預字元凱注自没汝寬者春秋昭公二十八年晋魏獻子舒爲政以其子戊爲梗陽大夫今晋陽也冬梗陽有獄戊不能斷以其獄上於獻子訟人之大宗以女樂爲賂魏子將受之戊謂魏子二大夫閻没汝寬曰主以不賄聞于諸侯若受梗陽之賄貪莫甚焉吾子必諫皆許諾退朝待于庭饋入魏子召二大夫食比置三嘆既食使坐魏子曰吾聞諸伯叔諺曰惟食忘憂吾子置食之間三嘆何也同辭而對曰他人賜二小人酒不夕食饋之始至恐其不足是以一嘆中置自咎曰豈將軍食之而以不足是以再嘆及饋之畢願以小人之腹爲君子之心屬厭而止是以三嘆魏子辭梗陽之賄獻謚也武子則名顆謚曰武爲無爲則無不治矣䟽無聲而無臭人固不識而不知無聲無臭者詩大雅文王篇也言天道難知耳不聞聲音鼻不聞臭芳儀法文王之事則天下自信而順也不識不知者詩大雅皇矣篇言人不識古不知今順天之法而行之義云無爲之理其大矣哉無爲者非謂引而不來推而不去迫而不應感而不動堅滯而不流捲握而不散也謂其私志不入公道嗜欲不枉正術循理而舉事因資而立功事成而身不伐功立而名不有若夫水用船而沙用音衰泥用橇起嬌切山用力追切夏瀆冬陂因高而田因下而池故非吾所謂爲也乃無爲矣聖人之無爲也因循任下責成不勞謀無失策舉無遺事言爲文章行爲表則進退應時動靜循理美醜不好憎賞罰不喜怒名各自命類各自用事由自然莫出於己順天之時順地之性因人之心是則群臣輻輳賢與不肖各盡其用君得所以制臣臣得所以事君此理國無爲之道也道冲章第四象帝之先䟽帝出乎震易繫辭之詞也震東方卦也少陽之氣生化之源今以太子居東宫少陽之位御極爲出震之期蓋取象天地生育萬物之始也兆見曰象無形曰氣生物之首也大道復在象帝之先言其高遠也天地章第五以萬物爲芻狗䟽結草爲狗以用祭祀也者莊子天運篇具載注云弊蓋之恩者禮記檀弓篇云仲尼之畜狗死使子貢埋之曰吾聞弊帷不棄爲埋馬也君之路馬死埋之以帷弊蓋不棄爲埋狗也丘也貧無蓋於其封也亦與之席無使其首陷焉恐其首直委於土也天長地久章第七聖人後身外身義云碎琥珀之枕焚雉頭之裘罷一臺之費却千里之馬德垂當代名光竹帛上善若水章第八政善治䟽正容悟物者莊子田子方第二十一篇文也子方名無擇侍座于魏文侯文侯師子夏友於子方子方數稱谿工之道文侯以爲谿工子方之師也子方曰非也里之人也稱道數當故無擇稱之無擇之師東郭順子其爲人也人貌而天虚縁而葆眞清而容物物無道正容以悟之使人之意也銷無擇何足以稱之夫唯不爭故無尤義云不爭之德德之先也凡人之性不能無爭爲爭之者其事衆矣亂逆必爭暴慢必爭忿怒必爭奢泰必爭矜伐必爭勝尚必爭違慢必爭進取必爭勇怯必爭愛惡必爭專恣必爭寵嬖必爭王者有一于此則興師海内諸侯有一于此則兵交其國卿大夫有一于此則賊亂其家士庶人有一于此則害成於身皆起於無思慮愆禮法不畏懼不容忍爭乃興焉故爭城者殺人盈城爭地者殺人滿野必當察起爭之本塞爲爭之源無不理矣持而盈之章第九金玉滿堂莫之能守䟽假使貪求不已適令金玉滿堂象有齒而焚身鷄畏犧而斷尾且失不貪之寳坐貽致寇之憂以其賈害豈云能守象有齒而焚身者春秋襄公二十四年晋范宣子爲政諸侯之弊重鄭人病之二月鄭伯如晋子産寓書于子西以告宣子曰子爲晋國四鄰諸侯不聞令德而聞重弊僑也惑之僑聞君子長國家者非無賄之患而無令名之難夫諸侯之賄聚於公室則諸侯貳若吾子賴之則晋國貳注貳離也諸侯貳則晋國壊晋國貳則子之家壊何汲汲也將焉用賄夫令名德之輿也德國家之基也有基無壞無亦是務乎有德則樂樂則能久詩云樂止君子邦家之基有令德也夫恕思以明德令名載而行之是以遠至邇安無寧使人謂子子實生我而謂子浚我以生乎注浚取也言取我財以自生象有齒以焚其身賄也宣子悦乃輕弊是行也鄭伯朝晋爲重弊故也鷄斷尾者春秋周景王子子朝之傳賔孟適郊見雄鷄自斷其尾嘆曰犧牲之用存乎全而肥實今自斷其尾使己不全冀免爲犧牲之用鷄之保其身也如此况於人乎貪利忘其身智不及鷄矣不貪寳者鄭人有得玉獻於子罕曰此寳也將以獻之子罕曰汝以玉爲寳我以不貪爲寳我若取玉俱喪寳矣不若兩全之遂不受玉致寇者易解卦九三辭曰負且乗致寇至負乃小人之事乗爲君子之器棄小任大物所不與致寇盜奪之矣功成名遂義曰禦灾除患曰功富貴尊榮曰名高鳥盡而良弓藏狡兔死而獵犬烹勢使然也范蠡扁舟而脱禍文種固位而喪身此之謂矣日中則昃月滿則虧子房絶粒以優游䟽廣解印而高尚固無上蔡華亭之追痛矣載營魄章第十載營魄䟽故春秋子産曰人生始化曰魄者春秋昭公七年初鄭伯有爲政駟帶殺之鄭人相驚曰伯有至矣或夢伯有介曰壬子余將殺帶明年殺段於是壬子駟帶卒明年公孫段卒鄭人益懼或問子産曰伯有猶能爲鬼乎子産曰人生陰曰魄陽曰魂用物精多則魂魄强匹夫匹婦强死而魂魄猶能依憑於人以爲淫厲况伯有三世執其政柄而强爲鬼神不亦宜乎伯有乃穆公之胄子良之孫子耳之子故曰三世子産立其子良止以撫之乃止近死之心莫使復陽者莊子齊物篇之辭也三魂名胎光爽靈幽精七魄尸狗伏矢雀陰吞賊除穢臭肺蜚毒此出上清品愛民治國義曰生民者國之本也無爲者道之化也以無爲之化愛育於人國本固矣政虐而苛則爲暴矣賦重役繁則傷性也使之不以時則妨農也不務儉約則殘穀矣天門開闔義曰修愛民理國之事爲垂衣南面之君猶須恭己奉天以順曆數者謂受命之曆五運之數也舜命禹曰天之曆數在躬天禄永終謂曆數在躬以承天命故可大寳愛之謂之寳命自天而授謂之受命於天易繫曰聖人之大寳曰位是也天門開則降非常之瑞或黃星動彩赤伏表符紫氣充庭五星聚井流虹貫月火電繞樞然後維嶽降神誕生宰輔以佐佑之故應天順人拯物除害而承曆數以有天下也及乎臨御失所刑政乖宜衆叛親離兵交禍起逆亂生於下氣象見於上日霣天開山崩川竭灾凶蜂起而國亡矣是天開闔也一開一闔謂之變者易繫辭云謂開閉相循陰陽遞至倚伏之義也三十輻章第十一䟽乾坤是大易之韞者義云易繫辭也明易之所立本乎乾坤乾坤不存則易道無由起也三十輻共一轂䟽衆竅互作者莊子第二篇也埏埴以爲器䟽陶匠者尚書云範土曰陶舜側微之時耕於歷山陶于河濱是也鑿户牖以爲室䟽詩云陶復陶穴莊子曰室無空虚則婦姑勃蹊陶復者詩文王之什緜緜篇云古公亶父陶復陶穴未有家室古公者邠公也古言久也亶公字也文王祖處于邠也婦姑爭者蹊路徑也勃戾怒也莊子外篇言室中不空蹊路湫隘則爭路而行失婦之道也故有之以爲利無之以爲用䟽形而上形而下義形而上者道之本清虚無爲處乎上也形而下者道之用禀質流形處乎下也顯道之用以形于物物禀有質故謂之器器者有形之類也聖人法道之用制以爲器畫卦觀象以制文字刳木爲舟剡木爲楫斷木爲杵掘地爲臼弦木爲弧剡木爲矢制以宫室結爲網罟服牛乗馬負重致遠鑄金爲兵掲竿爲旗斲木爲耜𦔇木爲耒一事以上以利天下此皆分道之用以爲器物爾皆易繫所稱此乃道是無體之名形是有質之用凡萬物從無而生衆形而由道而立先道而後形道在形之上形在道之下故自形而上謂之道自形而下謂之器形雖處道器兩畔之際形在器上不在道也既有形質可爲器用故云形而下者謂之器五色章第十二五色令人目盲五音令人耳聾五味令人口爽義曰五音者按漢劉向曰宫者中也君之德也商者章也物成章也角者甲也物發生也徵者祉也物之盛大䌓祉也羽者聚也物聚而藏也䟽五色者按王叔師曰皎皎素絲得藍則青得丹則赤得蘖則黃得皂則黑而爲五色也五色之設本以彰五行之象别尊卑之飾五音之設本以通天地之氣彰五行之聲五味之設本以彰五行之和以養於人已上二事若人耽滯不曰聾盲口爽乎味之所爭有羊羹解黿之禍矣羊羹者春秋桓公二年鄭公子歸生受楚子之命伐宋宋華元樂莒帥師以禦之二月壬子戰于大棘將戰華元殺羊以食士其御羊斟不預及戰曰疇昔之羊子爲政今日之事我爲政與入鄭師故宋師大敗鄭人囚華元獲樂莒甲兵四百六十乗俘二百五十人馘百人宋以兵車百乗文馬百駟以贖華元于鄭半入華元逃歸立子門外告而後入見羊斟曰子之馬然也對曰非馬也其人也既答而叔䍧斟之字也奔魯君子謂羊斟非人也以其私憾敗國殄民於是形孰大焉小雅所謂人無良者其羊斟之謂乎殘民以逞矣解黿者宣公四年楚人獻黿於鄭靈公穆公太子夷也公子子公名宗子家歸生將入見子公食指動第二指以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先爲難子家曰畜老猶憚殺之而况君乎反譖子家子家懼而從之夏殺靈公書曰鄭公子歸生殺其君夷權不足也子家權不足以人禦子公懼譖而從弑故書首爲惡也君子曰仁而不武無能遠也初稱畜老仁也不討子公是不武也不能自通於仁道而陷弑君之名其實子公染指而成斯禍爾馳騁畋獵注曰以心鬭者莊子内篇第二之辭也義曰禮天子諸侯每歲三畋一爲乾豆祭祀宗廟也二爲賔友交二國之好也三充君之庖食以時也時而不畋則曰不敬畋不以時則謂之暴所以春蒐夏苗秋獮冬狩皆俟農隙以講武事也獺未祭魚網罟不施于川豺未祭獸罝罘不通於野鷹隼未擊罻羅不張於林修祭禽之禮展三驅之仁順天時也天子仲春教旅振遂以畋獵仲夏教芙田遂以苗仲秋教理兵遂以獮仲冬教大閲遂以狩大司馬以掌其事山虞澤虞以供其職蓋以教武事以示民也則有不遵典故外則作禽荒暴物扼時十旬不返馳騁莫已遂爲發狂人怨國危失禮致禍也難得之貨令䟽乖失天倪者莊子曰始卒若環莫得其端是謂天均天均者天倪也天倪者天然之分也故去彼取此義曰夫人君之心睿聖爲本理國之道清淨爲基若其逐獸荒原奔車絶巘六龍逸足萬騎莫追與鵰鶚以爭先共熊羆而賈勇日月虧蔽旌旗糾紛畋獵忘歸殺獲無已風雨恒苦宫室或空此謂之發狂也若復貴遠方之物産貪無用之土疆嗜蒟醬而討西戎伐大宛而取名馬關塞有不歸之魄邊城有怨曠之魂天下流亡户口减耗赫赫宗廟幾陷寇讎青史具書百代爲戒寵辱章第十三寵辱若驚義曰且人君富有天下尊繼百王告類上玄君臨萬有亦當馭朽自戒納隍軫憂乃能享此大年保其遐祚矣人臣之遭遇也九遷三接之澤既以厚矣兵符相印之任亦已重矣高冠大斾長轂朱輪氣壓伊皋權傾衛霍亦當夙興夜寐履薄臨深乃能克保福祥免貽覆餗矣故令尹三已而無愠考父三命而益恭達其理也大患若身義曰恃寵驕盈者春秋隱公四年衛公子州吁恃寵而好兵其臣石碏諫衛莊公曰臣聞愛子教之義方不納于邪驕奢淫佚所自邪也四者之來寵禄過也夫寵而不驕驕而能降降而不憾憾而能音軫者鮮矣公不聽明年桓公立州吁弑桓公衛人殺州吁焉是則因寵獲禍矣視之不見章第十四此三者不可致詰故復混而爲一義曰夷希微三者假標以名道亦皆無也三者疑化爲三境次爲三界下爲三才明爲三光於身爲三元於内爲三一皆大道分精運化之所成也三境者三寳君之祖氣所凝之色青黄白亦名玄元始三氣之作乃諸天之宗祖萬化之元本也三界者欲界六天以統九仙色界十八天以統九眞無色界四天以統九聖也三元者人身之中腦爲泥丸官以主上元心爲絳宫以主中元臍下爲丹田以主下元三一者上元所主謂之元一中元所主謂之眞一下元所主謂之正一三一元神主混氣固精寳神留形上清有徊風混合修三一之道豫若冬涉川義曰可以疑難古人如然今之代人逐境生迷萬緒雲蒸千途蜂起功名聲色爭先鋭進之心厚利豐財競起貪求之迹或烹燔取樂或傷殺恣情投身於愛欲之川隨流不返溺性於漂沉之浪有去無回豈獨冰痛於難抑且報應明驗何者溺利欲之人涉遠營求有水陸邀劫之報凌抑於人有忿爭刑網之報上誷於君有誅殛喪家之報下虐於民有召寇起讎之報况於傷生害己破國亡家之甚乎孰能安以久動之徐生義曰修煉門多泛舉大略有吐納元和咽漱雲液茹松食柏絶粒餌芝或隱朝上清密伺玄斗或五金八石或水玉流珠陰鼎陽爐五華九轉或素文丹籙檄召鬼神金鈕青絲質盟天地則有正一道德升玄洞神靈寳盟眞三清衆法并革凡登道證品升眞又有奔二景朝五辰據極攀魁鶩網飛紀吞日咽月制魄拘魂八道望雲九眞受事升玄卧斗方諸洞房左右靈飛陰陽六甲三部八景二十四眞存服三元注想三一紫房黃闕絳景朱嬰紫虚南嶽之篇青童東海之訣内視五藏下制六天導引吞符御風養氣騰舉之道溢於眞經唐玄宗御製道德眞經䟽卷之一
